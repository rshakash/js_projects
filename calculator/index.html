<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="./main.css">
</head>
<body>
    
    <main>
        <div class="display">
            0
        </div>
        <button class="num1 number" value="1">1</button>
        <button class="num2 number" value="2">2</button>
        <button class="num3 number" value="3">3</button>
        <button class="num4 number" value="4">4</button>
        <button class="num5 number" value="5">5</button>
        <button class="num6 number" value="6">6</button>
        <button class="num7 number" value="7">7</button>
        <button class="num8 number" value="8">8</button>
        <button class="num9 number" value="9">9</button>
        <button class="num0 number" value="0">0</button>
        <button class="dot number" value=".">.</button>
        <button class="equals op" value="=">=</button>
        <button class="plus op" value="+">+</button>
        <button class="minus op" value="-">-</button>
        <button class="multiply op" value="*">*</button>
        <button class="divide op" value="/">/</button>
        <button class="clear op" value="C">C</button>
    </main>

    <script src="./main.js"></script>
</body>
</html>
